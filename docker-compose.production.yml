version: '3.8'
services:
  agentkube:
    image: siddhantprateek/agentkube:$VERSION
    ports:
      - "8767:8765"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      APP_URL: ${APP_URL}
      DOCUSIGN_BASE_URL: ${DOCUSIGN_BASE_URL}
      DOCUSIGN_INTEGRATION_KEY: ${DOCUSIGN_INTEGRATION_KEY}
      DOCUSIGN_IMPERSONATED_USER_ID: ${DOCUSIGN_IMPERSONATED_USER_ID}
      DOCUSIGN_SECRET_KEY: ${DOCUSIGN_SECRET_KEY}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./keys/private.key:/app/keys/private.key

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:7
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agentkube.com
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8050:80"
    volumes:
      - ./storage/pgadmin_data:/var/lib/pgadmin
      - ./pgadmin.json:/pgadmin/config.json:ro

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./storage/qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - ./storage/redis_data:/data
    command: [ "redis-server", "--save", "60 1", "--loglevel", "warning" ]
