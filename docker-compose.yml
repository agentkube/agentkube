version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:7
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agentkube.com
      PGADMIN_DEFAULT_PASSWORD: $POSTGRES_PASSWORD
    ports:
      - "8050:80"
    volumes:
      - ./storage/pgadmin_data:/var/lib/pgadmin
      - ./pgadmin.json:/pgadmin/config.json:ro 

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./storage/qdrant_data:/qdrant/storage 

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - ./storage/redis_data:/data
    command: ["redis-server", "--save", "60 1", "--loglevel", "warning"]
